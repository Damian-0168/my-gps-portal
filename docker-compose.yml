services:
  traccar:
    image: traccar/traccar:latest
    container_name: traccar-server
    restart: always
    ports:
      - "8082:8082"             # Web Interface & API
      - "5000-5150:5000-5150"     # GPS Protocols (TCP)
      - "5000-5150:5000-5150/udp" # GPS Protocols (UDP)
    volumes:
      - ./traccar/logs:/opt/traccar/logs:rw
      - ./traccar/traccar.xml:/opt/traccar/conf/traccar.xml:ro
      - ./traccar/data:/opt/traccar/data:rw

volumes:
  traccar_data:
  traccar_logs:
